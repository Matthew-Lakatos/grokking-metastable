# Example configuration for Arrhenius sweep (learning rate = 0.002)
# The full sweep varies lr via command line; this file is for reference.
task: modular_add
model: tiny_transformer
n: 4000
batch_size: 512
lr: 0.002
weight_decay: 0.3
max_steps: 150000
log_interval: 25
seed: 0
emb: 32
nhead: 2
nlayers: 2
sigma_p: 1.0
sigma_q: 1e-5
outdir: runs/arrhenius_transformer/lr_0.002_seed_0
grok_threshold: 0.1
